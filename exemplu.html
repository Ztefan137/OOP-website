<!DOCTYPE html>
<html lang="ro">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Exemplu grafic</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="tail_wind_config.js"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-clike.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
    </head>
<body>

    <div class="content-container">

        <div class="content-header">
            <div>
                <h1 class="content-header-title">Titlu</h1>
                <p class="content-header-subtitle">Subtitlu</p>
            </div>
            
            <a href="./index.html" class="btn-primary">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"></path>
                </svg>
                <span>Înapoi la Dashboard</span>
            </a>
        </div>

        <div class="content-card">
            <h2 class="content-card-title"">Titlu</h2>
            <p class="content-card-text">Paragraf1</p>
            <p class="content-card-text">Paragraf2</p>
        </div>

        <div class="definition-grid">
            <div class="definition-card-yellow">
                <h2 class="definition-title">Card special galben</h2>
                <p class="definition-text">Paragraf</p>
            </div>
            <div class="definition-card-green">
                <h2 class="definition-title">Card special verde</h2>
                <p class="definition-text">Paragraf</p>
            </div>
        </div>

        <div class="completion-banner">
            <div>
                <h3 class="completion-title">Ai înțeles conceptele?</h3>
                <p class="completion-subtitle">Marchează lecția ca finalizată pentru a-ți actualiza progresul pe dashboard.</p>
                <p class="completion-subtitle">Ăsta e special pentru lecții</p>
            </div>
            <button id="btn-finalizare" class="btn-action">
                Marchează ca Finalizat &rarr;
            </button>
        </div>
    </div>

</body>
</html>
